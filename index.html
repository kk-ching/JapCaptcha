<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiragana CAPTCHA Solver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Japanese CAPTCHA Solver</h1>
        <div class="lang-buttons">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ja">JA</button>
            <button class="lang-btn" data-lang="zh">ZH</button>
        </div>
    </div>
    
    <div class="container">
        <div class="solver-box">
            <p class="instruction">Don't understand Japanese? No problem! Click the characters you see:</p>
            
            <div id="charGrid" class="char-grid">
            </div>

            <div class="output-section">
                <label for="romajiOutput">Result:</label>
                <input 
                    id="romajiOutput" 
                    type="text"
                    class="output-field"
                    readonly
                    placeholder="あいうえお"
                >
                <div class="button-group">
                    <button id="copyBtn" class="copy-btn">Copy</button>
                    <button id="clearBtn" class="clear-btn">Clear</button>
                </div>
            </div>
        </div>
        <div class="why-box" style="display: none;">
            <h1>なんでこれ使うの</h1>
            <img src='./megamind.jpg' alt='megamind'>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
